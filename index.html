<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Struggle</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
--bg-center: #eef2f8;
--bg-mid: #dbe2ef;
--bg-edge: #c6d0e1;

--text: #23262d;
--subtle: #4f5763;
--subtle-2: #69727e;

--line: rgba(84, 95, 120, 0.18);
--line-soft: rgba(84, 95, 120, 0.10);

--button-bg: rgba(255, 255, 255, 0.42);
--button-bg-hover: rgba(255, 255, 255, 0.62);
--button-text: #2a2f38;

--shadow: 0 16px 36px rgba(54, 68, 96, 0.11);
--shadow-soft: 0 8px 24px rgba(54, 68, 96, 0.07);
}

* {
box-sizing: border-box;
}

html, body {
margin: 0;
padding: 0;
min-height: 100%;
}


.logo {
display: flex;
justify-content: flex-start;
margin-bottom: 6px;
padding-left: 0;
}

.logo img {
width: 140px;
height: auto;
filter: drop-shadow(0 14px 40px rgba(0,0,0,0.10));
}

@media (min-width: 900px) {
.logo {
justify-content: flex-start;
margin-bottom: 0;
padding-left: 120px;
}

.logo img {
width: 190px;
}
}
  
html {
scroll-behavior: smooth;
}

body {
font-family: 'Inter', Arial, sans-serif;
color: var(--text);
overflow: hidden;
position: relative;
background:
radial-gradient(circle at center, rgba(255,255,255,0.80) 0%, rgba(255,255,255,0.16) 34%, rgba(255,255,255,0) 58%),
radial-gradient(circle at center, var(--bg-center) 0%, var(--bg-mid) 58%, var(--bg-edge) 100%);
}

/* weiche Lichtinseln + mehr Raumtiefe */
body::before {
content: "";
position: fixed;
inset: 0;
pointer-events: none;
opacity: 0.52;
background:
radial-gradient(circle at 50% 46%, rgba(255,255,255,0.34) 0%, rgba(255,255,255,0) 30%),
radial-gradient(circle at 18% 22%, rgba(255,255,255,0.24) 0%, rgba(255,255,255,0) 22%),
radial-gradient(circle at 82% 20%, rgba(210,220,238,0.16) 0%, rgba(210,220,238,0) 20%),
radial-gradient(circle at 20% 82%, rgba(205,216,236,0.14) 0%, rgba(205,216,236,0) 22%),
radial-gradient(circle at 80% 78%, rgba(198,210,232,0.12) 0%, rgba(198,210,232,0) 24%);
mix-blend-mode: screen;
z-index: 0;
}

/* feines Grundrauschen */
body::after {
content: "";
position: fixed;
inset: 0;
pointer-events: none;
opacity: 0.035;
background-image:
radial-gradient(rgba(40, 48, 67, 0.85) 0.45px, transparent 0.45px);
background-size: 8px 8px;
z-index: 0;
}

.ambient-blur {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 1;
filter: blur(42px);
opacity: 0.72;
background:
radial-gradient(circle at 50% 48%, rgba(255,255,255,0.52) 0%, rgba(255,255,255,0) 26%),
radial-gradient(circle at 14% 68%, rgba(210,220,238,0.24) 0%, rgba(210,220,238,0) 18%),
radial-gradient(circle at 86% 30%, rgba(205,216,236,0.20) 0%, rgba(205,216,236,0) 18%),
radial-gradient(circle at 50% 100%, rgba(190,202,226,0.10) 0%, rgba(190,202,226,0) 30%);
}

.bg-wrap {
position: fixed;
inset: -2%;
pointer-events: none;
z-index: 2;
transform: translate3d(0, 0, 0);
will-change: transform;
animation: bgFloat 20s ease-in-out infinite;
}

.bg {
display: block;
width: 104%;
height: 104%;
transform: scale(1.04);
}

@keyframes bgFloat {
0% { transform: translate3d(0px, 0px, 0px); }
25% { transform: translate3d(4px, -5px, 0px); }
50% { transform: translate3d(0px, -10px, 0px); }
75% { transform: translate3d(-4px, -5px, 0px); }
100% { transform: translate3d(0px, 0px, 0px); }
}

.page {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 48px;
position: relative;
z-index: 4;
}

.content {
width: min(90vw, 760px);
text-align: left;
transform: translateY(1.2vh);
opacity: 0;
animation: contentFade 1.5s ease forwards;
animation-delay: 0.15s;
}

@keyframes contentFade {
0% {
opacity: 0;
transform: translateY(18px);
}
100% {
opacity: 1;
transform: translateY(1.2vh);
}
}

.glass-panel {
display: inline-block;
padding: 10px 12px 12px 0;
background: transparent;
border-radius: 18px;
}

h1 {
margin: 0;
font-family: 'Playfair Display', serif;
font-weight: 400;
font-size: clamp(60px, 8vw, 112px);
line-height: 0.90;
letter-spacing: 0.03em;
color: rgba(35, 38, 45, 0.92);
text-shadow: 0 1px 0 rgba(255,255,255,0.18);
}

.tagline {
margin: 34px 0 0 0;
font-size: 1.05rem;
letter-spacing: 0.04em;
text-transform: none;
color: rgba(209, 122, 58, 0.92);
font-weight: 500;
text-align: left;
}

.soon {
margin: 22px 0 0 0;
font-size: 1rem;
line-height: 1.6;
color: #5f6670;
max-width: 320px;
}

.actions {
margin-top: 30px;
display: flex;
align-items: center;
gap: 14px;
flex-wrap: wrap;
}

.button {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 52px;
  padding: 0 28px;
  border-radius: 999px;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.02em;
  overflow: hidden;
  transition: all 0.25s ease;
}

.button.primary {
background: linear-gradient(
135deg,
#3a5c4a 0%,
#4c6c5a 35%,
#6f8c7b 62%,
#5f7f6f 100%
);
color: #ffffff;
border: none;
box-shadow:
0 8px 22px rgba(40, 60, 50, 0.16),
inset 0 1px 0 rgba(255,255,255,0.28);
}

.button.primary::after {
content: "";
position: absolute;
inset: 0;
border-radius: inherit;
background:
radial-gradient(
circle at 28% 22%,
rgba(255,255,255,0.30),
transparent 46%
),
linear-gradient(
180deg,
rgba(255,255,255,0.10) 0%,
rgba(255,255,255,0.00) 55%
);
opacity: 0.55;
pointer-events: none;
}

.button.primary:hover {
transform: translateY(-1px);
box-shadow:
0 12px 28px rgba(40, 60, 50, 0.20),
inset 0 1px 0 rgba(255,255,255,0.34);
}

.button.secondary {
background: rgba(255, 255, 255, 0.45); /* deutlich stärker */
backdrop-filter: blur(8px);

color: #d17a3a;
border: 1.2px solid rgba(209, 122, 58, 0.65);

box-shadow:
0 8px 20px rgba(54, 68, 96, 0.10),
inset 0 1px 0 rgba(255,255,255,0.6);
}

.button.secondary:hover {
transform: translateY(-1px);

background: rgba(255, 255, 255, 0.55);

border-color: rgba(209, 122, 58, 0.75);

box-shadow:
0 10px 24px rgba(54, 68, 96, 0.12),
inset 0 1px 0 rgba(255,255,255,0.5);
}

.actions {
gap: 18px;
}

.button.primary,
.button.secondary {
min-width: 240px;
justify-content: center;
}
  
.fade-up-1 { animation-delay: 0.2s; }
.fade-up-2 { animation-delay: 0.35s; }
.fade-up-3 { animation-delay: 0.5s; }
.fade-up-4 { animation-delay: 0.65s; }

.fade-item {
opacity: 0;
transform: translateY(14px);
animation: fadeUp 1s ease forwards;
}
  
@keyframes fadeUp {
to {
opacity: 1;
transform: translateY(0);
}
}

.signup-panel {
margin-top: 18px;
width: min(100%, 620px);
}

.signup-form {
background: rgba(255, 255, 255, 0.52);
border: 1px solid rgba(84, 95, 120, 0.14);
border-radius: 22px;
padding: 18px;
box-shadow: 0 10px 28px rgba(54, 68, 96, 0.08);
backdrop-filter: blur(10px);
}

.signup-label {
display: block;
margin-bottom: 10px;
font-size: 14px;
color: #4f5763;
}

.signup-row {
display: flex;
gap: 12px;
align-items: center;
}

.signup-input {
flex: 1;
min-height: 52px;
border-radius: 999px;
border: 1px solid rgba(84, 95, 120, 0.16);
background: rgba(255, 255, 255, 0.82);
padding: 0 18px;
font-size: 15px;
color: #23262d;
outline: none;
}

.signup-input::placeholder {
color: #7a838f;
}

.signup-input:focus {
border-color: rgba(58, 92, 74, 0.42);
box-shadow: 0 0 0 3px rgba(58, 92, 74, 0.08);
}

.signup-submit {
min-height: 52px;
padding: 0 22px;
border: none;
border-radius: 999px;
background: linear-gradient(
135deg,
#3a5c4a 0%,
#4c6c5a 35%,
#6f8c7b 62%,
#5f7f6f 100%
);
color: #fff;
font-size: 15px;
font-weight: 500;
cursor: pointer;
box-shadow:
0 8px 22px rgba(40, 60, 50, 0.16),
inset 0 1px 0 rgba(255,255,255,0.28);
}

.signup-note {
margin: 12px 4px 0;
font-size: 13px;
color: #69727e;
}

.signup-message {
margin: 10px 4px 0;
font-size: 14px;
color: #3a5c4a;
min-height: 20px;
}
  
@media (min-width: 1200px) {
.content {
width: min(86vw, 820px);
transform: translateY(-0.6vh);
}

.bg {
transform: scale(1.08);
}

.ambient-blur {
opacity: 0.76;
filter: blur(46px);
}

h1 {
font-size: clamp(76px, 7vw, 118px);
}
}

@media (max-width: 600px) {
.bg-wrap {
inset: -10%;
animation: none;
transform: none;
filter: blur(0.8px);
}

.bg {
display: block;
opacity: 0.82;
width: 122%;
height: 122%;
transform: translate(-8%, -4%) scale(1.01);
}

.mobile-octagons {
display: block;
position: fixed;
inset: 0;
z-index: 3;
pointer-events: none;
opacity: 0.48;
background-image:
url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 430 220'><g fill='none' stroke='rgba(84,95,120,0.10)' stroke-width='1'><polygon points='55,30 105,2 155,30 155,88 105,116 55,88'/><polygon points='155,30 205,2 255,30 255,88 205,116 155,88'/><polygon points='255,30 305,2 355,30 355,88 305,116 255,88'/><polygon points='5,88 55,60 105,88 105,146 55,174 5,146'/><polygon points='105,88 155,60 205,88 205,146 155,174 105,146'/><polygon points='205,88 255,60 305,88 305,146 255,174 205,146'/><polygon points='305,88 355,60 405,88 405,146 355,174 305,146'/></g></svg>");
background-repeat: no-repeat;
background-size: 128% auto;
background-position: center top 8px;
mask-image: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.78) 42%, rgba(0,0,0,0.22) 72%, rgba(0,0,0,0) 100%);
-webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.78) 42%, rgba(0,0,0,0.22) 72%, rgba(0,0,0,0) 100%);
}

.logo {
display: flex;
justify-content: center;
align-items: center;
width: 100%;
padding-left: 0;
margin-bottom: 6px;
}

.logo img {
width: 150px;
}

.page {
padding: 18px 26px 42px;
}

.content {
transform: translateY(-6px);
text-align: center;
width: min(92vw, 520px);
}

.glass-panel {
padding: 0;
margin: 0 auto;
}

h1 {
font-size: clamp(54px, 15vw, 82px);
line-height: 0.92;
letter-spacing: 0.028em;
}

.tagline {
text-align: center;
width: 100%;
margin-top: 20px;
margin-bottom: 20px;
}

.soon {
text-align: center;
max-width: 100%;
}

.actions {
gap: 14px;
justify-content: center;
margin-top: 30px;
margin-bottom: 52px;
}

.button {
width: min(100%, 430px);
min-height: 46px;
padding: 0 22px;
justify-content: center;
font-size: 14px;
}

.button.primary {
background: linear-gradient(
90deg,
#3a6e5d 0%,
#4a7d69 18%,
#5d8d78 34%,
#88ab97 50%,
#5d8d78 66%,
#4a7d69 82%,
#3a6e5d 100%
);
box-shadow:
0 8px 22px rgba(31, 54, 47, 0.14),
inset 0 1px 0 rgba(255,255,255,0.14);
}

.button.primary::after {
background:
linear-gradient(
180deg,
rgba(255,255,255,0.035) 0%,
rgba(255,255,255,0.00) 58%
);
opacity: 0.22;
}

.button.primary:hover {
background: linear-gradient(
90deg,
#346454 0%,
#43715f 18%,
#55826d 34%,
#7e9f8c 50%,
#55826d 66%,
#43715f 82%,
#346454 100%
);
box-shadow:
0 10px 24px rgba(31, 54, 47, 0.16),
inset 0 1px 0 rgba(255,255,255,0.16);
}

.site-footer {
bottom: 30px;
font-size: 12px;
color: rgba(35, 38, 45, 0.56);
}

.signup-panel {
margin-top: 14px;
width: 100%;
}

.signup-form {
padding: 14px;
border-radius: 20px;
}

.signup-row {
flex-direction: column;
align-items: stretch;
}

.signup-submit,
.signup-input {
width: 100%;
}  
}

@media (prefers-reduced-motion: reduce) {
  .bg-wrap,
  .content,
  .fade-item {
    animation: none !important;
  }

  .bg-wrap {
    transform: none !important;
  }

  .content,
  .fade-item {
    opacity: 1 !important;
    transform: none !important;
  }

  .button {
    transition: none !important;
  }
}


.site-footer {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 13px;
  color: rgba(35, 38, 45, 0.50);
  pointer-events: auto;
}

.site-footer a,
.site-footer span {
  position: relative;
  z-index: 10000;
}

.site-footer a {
  color: inherit;
  text-decoration: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.site-footer a:hover {
  text-decoration: underline;
}

body::before,
body::after,
.ambient-blur,
.bg-wrap {
  pointer-events: none;
}

.mobile-octagons {
display: none;
}
  
</style>

<script>
const openSignup = document.getElementById("openSignup");
const signupPanel = document.getElementById("signupPanel");
const signupForm = document.getElementById("signupForm");
const signupMessage = document.getElementById("signupMessage");
const emailInput = document.getElementById("email");

openSignup.addEventListener("click", () => {
signupPanel.hidden = false;
signupPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
emailInput.focus();
});

signupForm.addEventListener("submit", async (event) => {
event.preventDefault();

const email = emailInput.value.trim();

if (!email) {
signupMessage.textContent = "Bitte gib deine E-Mail-Adresse ein.";
return;
}

signupMessage.textContent = "Ich trage dich ein ...";

try {
const response = await fetch("https://smartstruggle-github-io.vercel.app/api/subscribe", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ email })
});

const data = await response.json();

if (!response.ok) {
signupMessage.textContent = "Gerade hat es nicht geklappt. Versuch es bitte nochmal.";
return;
}

signupMessage.textContent = "Danke – du bist auf der Liste.";
signupForm.reset();
} catch (error) {
signupMessage.textContent = "Gerade hat es nicht geklappt. Versuch es bitte nochmal.";
}
});
</script>

  
<script>
(function () {
const bgWrap = document.getElementById('bgWrap');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

if (reduceMotion || !bgWrap) return;

let currentX = 0;
let currentY = 0;
let targetX = 0;
let targetY = 0;

function handleMove(event) {
const x = event.clientX / window.innerWidth;
const y = event.clientY / window.innerHeight;

targetX = (x - 0.5) * 12;
targetY = (y - 0.5) * 9;
}

function animate() {
currentX += (targetX - currentX) * 0.04;
currentY += (targetY - currentY) * 0.04;

bgWrap.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
requestAnimationFrame(animate);
}

window.addEventListener('mousemove', handleMove, { passive: true });
animate();
})();
</script>
