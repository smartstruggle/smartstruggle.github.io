<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Struggle</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
--bg-center: #edf1f8;
--bg-mid: #d7deec;
--bg-edge: #bcc8dd;

--text: #23262d;
--subtle: #4f5763;
--subtle-2: #6a7380;

--line: rgba(77, 90, 118, 0.20);
--line-soft: rgba(77, 90, 118, 0.11);

--card: rgba(255, 255, 255, 0.28);
--card-border: rgba(255, 255, 255, 0.32);

--button-bg: rgba(255, 255, 255, 0.42);
--button-bg-hover: rgba(255, 255, 255, 0.58);
--button-text: #2a2f38;
--shadow: 0 10px 30px rgba(54, 68, 96, 0.10);
--shadow-soft: 0 4px 18px rgba(54, 68, 96, 0.06);
}

* {
box-sizing: border-box;
}

html, body {
margin: 0;
padding: 0;
min-height: 100%;
}

html {
scroll-behavior: smooth;
}

body {
font-family: 'Inter', Arial, sans-serif;
color: var(--text);
overflow: hidden;
position: relative;
background:
radial-gradient(circle at center, var(--bg-center) 0%, var(--bg-mid) 56%, var(--bg-edge) 100%);
}

/* weichere, wolkige Lichttiefe */
body::before {
content: "";
position: fixed;
inset: 0;
pointer-events: none;
opacity: 0.34;
background:
radial-gradient(circle at 16% 18%, rgba(255,255,255,0.40) 0%, rgba(255,255,255,0) 24%),
radial-gradient(circle at 82% 20%, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0) 23%),
radial-gradient(circle at 25% 79%, rgba(255,255,255,0.19) 0%, rgba(255,255,255,0) 23%),
radial-gradient(circle at 76% 76%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 25%),
radial-gradient(circle at 50% 48%, rgba(255,255,255,0.23) 0%, rgba(255,255,255,0) 34%);
mix-blend-mode: screen;
z-index: 0;
}

/* feines Grundrauschen */
body::after {
content: "";
position: fixed;
inset: 0;
pointer-events: none;
opacity: 0.055;
background-image:
radial-gradient(rgba(38, 48, 68, 0.95) 0.45px, transparent 0.45px);
background-size: 8px 8px;
z-index: 0;
}

.ambient-blur {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 1;
filter: blur(18px);
opacity: 0.42;
background:
radial-gradient(circle at 50% 48%, rgba(255,255,255,0.34) 0%, rgba(255,255,255,0) 26%),
radial-gradient(circle at 18% 70%, rgba(210,220,238,0.20) 0%, rgba(210,220,238,0) 20%),
radial-gradient(circle at 82% 32%, rgba(210,220,238,0.15) 0%, rgba(210,220,238,0) 18%);
}

.bg-wrap {
position: fixed;
inset: -2%;
pointer-events: none;
z-index: 2;
transform: translate3d(0, 0, 0);
will-change: transform;
animation: bgFloat 18s ease-in-out infinite;
}

.bg {
width: 104%;
height: 104%;
transform: scale(1.02);
}

@keyframes bgFloat {
0% { transform: translate3d(0px, 0px, 0px); }
25% { transform: translate3d(4px, -6px, 0px); }
50% { transform: translate3d(0px, -12px, 0px); }
75% { transform: translate3d(-5px, -6px, 0px); }
100% { transform: translate3d(0px, 0px, 0px); }
}

.page {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 48px;
position: relative;
z-index: 4;
}

.content {
width: min(90vw, 760px);
text-align: left;
transform: translateY(-1.5vh);
opacity: 0;
animation: contentFade 1.5s ease forwards;
animation-delay: 0.15s;
}

@keyframes contentFade {
0% {
opacity: 0;
transform: translateY(18px);
}
100% {
opacity: 1;
transform: translateY(-1.5vh);
}
}

.glass-panel {
display: inline-block;
padding: 18px 22px 20px 0;
background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
backdrop-filter: blur(1.2px);
-webkit-backdrop-filter: blur(1.2px);
border-radius: 18px;
}

h1 {
margin: 0;
font-family: 'Playfair Display', serif;
font-weight: 400;
font-size: clamp(60px, 8vw, 112px);
line-height: 0.90;
letter-spacing: 0.018em;
color: var(--text);
text-shadow: 0 1px 0 rgba(255,255,255,0.18);
}

.divider {
width: clamp(180px, 28vw, 320px);
height: 1px;
margin: 26px 0 22px 2px;
background: linear-gradient(
90deg,
rgba(80, 92, 118, 0),
rgba(80, 92, 118, 0.28) 20%,
rgba(80, 92, 118, 0.36) 50%,
rgba(80, 92, 118, 0.28) 80%,
rgba(80, 92, 118, 0)
);
}

.tagline {
margin: 0;
font-size: clamp(21px, 2vw, 26px);
line-height: 1.25;
color: var(--subtle);
letter-spacing: 0.01em;
}

.soon {
margin: 10px 0 0 0;
font-size: clamp(18px, 1.6vw, 22px);
line-height: 1.25;
color: var(--subtle-2);
opacity: 0.95;
}

.actions {
margin-top: 28px;
display: flex;
align-items: center;
gap: 14px;
flex-wrap: wrap;
}

.button {
display: inline-flex;
align-items: center;
justify-content: center;
min-height: 46px;
padding: 0 18px;
border-radius: 999px;
border: 1px solid rgba(255,255,255,0.34);
background: var(--button-bg);
color: var(--button-text);
text-decoration: none;
font-size: 15px;
font-weight: 500;
letter-spacing: 0.01em;
box-shadow: var(--shadow-soft);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
transition:
transform 0.28s ease,
background 0.28s ease,
box-shadow 0.28s ease,
border-color 0.28s ease;
}

.button:hover {
transform: translateY(-1px);
background: var(--button-bg-hover);
box-shadow: var(--shadow);
border-color: rgba(255,255,255,0.5);
}

.button.secondary {
background: rgba(255,255,255,0.18);
color: var(--subtle);
}

.button.secondary:hover {
background: rgba(255,255,255,0.30);
}

.micro-note {
margin-top: 16px;
font-size: 14px;
line-height: 1.5;
color: rgba(72, 80, 94, 0.82);
max-width: 540px;
}

.fade-up-1 { animation-delay: 0.2s; }
.fade-up-2 { animation-delay: 0.35s; }
.fade-up-3 { animation-delay: 0.5s; }
.fade-up-4 { animation-delay: 0.65s; }

.fade-item {
opacity: 0;
transform: translateY(14px);
animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
to {
opacity: 1;
transform: translateY(0);
}
}

@media (max-width: 900px) {
.content {
width: min(92vw, 620px);
}

h1 {
font-size: clamp(54px, 12vw, 88px);
line-height: 0.92;
}

.divider {
margin-top: 22px;
margin-bottom: 18px;
}

.tagline {
font-size: clamp(18px, 4.6vw, 24px);
}

.soon {
margin-top: 8px;
font-size: clamp(16px, 4vw, 20px);
}

.actions {
margin-top: 24px;
}
}

@media (max-width: 560px) {
.page {
padding: 26px;
}

.content {
transform: translateY(-0.5vh);
}

.glass-panel {
padding-right: 8px;
}

.button {
width: 100%;
justify-content: center;
}

.micro-note {
font-size: 13.5px;
}
}

@media (prefers-reduced-motion: reduce) {
.bg-wrap,
.content,
.fade-item {
animation: none !important;
}

.bg-wrap {
transform: none !important;
}

.content,
.fade-item {
opacity: 1 !important;
transform: none !important;
}

.button {
transition: none !important;
}
}
</style>
</head>
<body>

<div class="bg-wrap" id="bgWrap">
<svg class="bg" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

<main class="page">

<script>
(function () {
const bgWrap = document.getElementById('bgWrap');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

if (reduceMotion || !bgWrap) return;

let currentX = 0;
let currentY = 0;
let targetX = 0;
let targetY = 0;

function handleMove(event) {
const x = event.clientX / window.innerWidth;
const y = event.clientY / window.innerHeight;

targetX = (x - 0.5) * 16;
targetY = (y - 0.5) * 12;
}

function animate() {
currentX += (targetX - currentX) * 0.05;
currentY += (targetY - currentY) * 0.05;

bgWrap.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
requestAnimationFrame(animate);
}

window.addEventListener('mousemove', handleMove, { passive: true });
animate();
})();
</script>
