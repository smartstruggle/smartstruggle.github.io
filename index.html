  <script>
    const menuToggle = document.getElementById("menuToggle");
    const siteNav = document.getElementById("siteNav");
    const navBackdrop = document.getElementById("navBackdrop");

    function openMenu() {
      siteNav.classList.add("is-open");
      navBackdrop.classList.add("is-visible");
      menuToggle.classList.add("is-open");
      menuToggle.setAttribute("aria-expanded", "true");
      menuToggle.setAttribute("aria-label", "Menü schließen");
    }

    function closeMenu() {
      siteNav.classList.remove("is-open");
      navBackdrop.classList.remove("is-visible");
      menuToggle.classList.remove("is-open");
      menuToggle.setAttribute("aria-expanded", "false");
      menuToggle.setAttribute("aria-label", "Menü öffnen");
    }

    menuToggle.addEventListener("click", () => {
      const isOpen = siteNav.classList.contains("is-open");
      isOpen ? closeMenu() : openMenu();
    });

    navBackdrop.addEventListener("click", closeMenu);

    siteNav.querySelectorAll("a").forEach((link) => {
      link.addEventListener("click", closeMenu);
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeMenu();
    });
  </script>

  <script>
    const openSignup = document.getElementById("openSignup");
    const modal = document.getElementById("modal");
    const closeModal = document.getElementById("closeModal");
    const modalEmail = document.getElementById("modalEmail");
    const modalSubmit = document.getElementById("modalSubmit");
    const modalMessage = document.getElementById("modalMessage");

    function closeSignupModal() {
      modal.classList.add("hidden");
      modal.setAttribute("aria-hidden", "true");
      modalMessage.textContent = "";
      modalEmail.value = "";
    }

    openSignup.addEventListener("click", () => {
      modal.classList.remove("hidden");
      modal.setAttribute("aria-hidden", "false");
      modalEmail.focus();
    });

    closeModal.addEventListener("click", closeSignupModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeSignupModal();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !modal.classList.contains("hidden")) {
        closeSignupModal();
      }
    });

    modalSubmit.addEventListener("click", async () => {
      const email = modalEmail.value.trim();

      if (!email) {
        modalMessage.textContent = "Bitte gib deine E-Mail-Adresse ein.";
        return;
      }

      modalMessage.textContent = "Ich trage dich ein ...";

      try {
        const response = await fetch("/api/subscribe", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email })
        });

        await response.json();

        if (!response.ok) {
          modalMessage.textContent = "Gerade hat es nicht geklappt. Versuch es bitte nochmal.";
          return;
        }

        modalMessage.textContent = "Danke – du bist auf der Liste.";
        modalEmail.value = "";
      } catch (error) {
        modalMessage.textContent = "Gerade hat es nicht geklappt. Versuch es bitte nochmal.";
      }
    });
  </script>

  <script>
    (function () {
      const bgWrap = document.getElementById("bgWrap");
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      if (reduceMotion || !bgWrap) return;

      let currentX = 0;
      let currentY = 0;
      let targetX = 0;
      let targetY = 0;

      function handleMove(event) {
        const x = event.clientX / window.innerWidth;
        const y = event.clientY / window.innerHeight;

        targetX = (x - 0.5) * 12;
        targetY = (y - 0.5) * 9;
      }

      function animate() {
        currentX += (targetX - currentX) * 0.04;
        currentY += (targetY - currentY) * 0.04;

        bgWrap.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
        requestAnimationFrame(animate);
      }

      window.addEventListener("mousemove", handleMove, { passive: true });
      animate();
    })();
  </script>
