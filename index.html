<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Struggle</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
--bg-center: #eef2f8;
--bg-mid: #dbe2ef;
--bg-edge: #c6d0e1;

--text: #23262d;
--subtle: #4f5763;
--subtle-2: #69727e;

--line: rgba(84, 95, 120, 0.12);
--line-soft: rgba(84, 95, 120, 0.07);

--button-bg: rgba(255, 255, 255, 0.42);
--button-bg-hover: rgba(255, 255, 255, 0.60);
--button-text: #2a2f38;

--shadow: 0 14px 35px rgba(54, 68, 96, 0.10);
--shadow-soft: 0 6px 20px rgba(54, 68, 96, 0.06);
}

* {
box-sizing: border-box;
}

html, body {
margin: 0;
padding: 0;
min-height: 100%;
}

html {
scroll-behavior: smooth;
}

body {
font-family: 'Inter', Arial, sans-serif;
color: var(--text);
overflow: hidden;
position: relative;
background:
radial-gradient(circle at center, var(--bg-center) 0%, var(--bg-mid) 58%, var(--bg-edge) 100%);
}

/* weiche Lichtinseln */
body::before {
content: "";
position: fixed;
inset: 0;
pointer-events: none;
opacity: 0.42;
background:
radial-gradient(circle at 18% 20%, rgba(255,255,255,0.36) 0%, rgba(255,255,255,0) 24%),
radial-gradient(circle at 82% 18%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0) 22%),
radial-gradient(circle at 24% 80%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 24%),
radial-gradient(circle at 78% 78%, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0) 24%),
radial-gradient(circle at 50% 48%, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0) 36%);
mix-blend-mode: screen;
z-index: 0;
}

/* sehr feines Grundrauschen */
body::after {
content: "";
position: fixed;
inset: 0;
pointer-events: none;
opacity: 0.04;
background-image:
radial-gradient(rgba(40, 48, 67, 0.85) 0.45px, transparent 0.45px);
background-size: 8px 8px;
z-index: 0;
}

.ambient-blur {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 1;
filter: blur(30px);
opacity: 0.60;
background:
radial-gradient(circle at 50% 48%, rgba(255,255,255,0.42) 0%, rgba(255,255,255,0) 28%),
radial-gradient(circle at 18% 72%, rgba(214,223,239,0.22) 0%, rgba(214,223,239,0) 22%),
radial-gradient(circle at 82% 30%, rgba(214,223,239,0.18) 0%, rgba(214,223,239,0) 20%);
}

.bg-wrap {
position: fixed;
inset: -2%;
pointer-events: none;
z-index: 2;
transform: translate3d(0, 0, 0);
will-change: transform;
animation: bgFloat 20s ease-in-out infinite;
}

.bg {
width: 104%;
height: 104%;
transform: scale(1.03);
}

@keyframes bgFloat {
0% { transform: translate3d(0px, 0px, 0px); }
25% { transform: translate3d(4px, -5px, 0px); }
50% { transform: translate3d(0px, -10px, 0px); }
75% { transform: translate3d(-4px, -5px, 0px); }
100% { transform: translate3d(0px, 0px, 0px); }
}

.page {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 48px;
position: relative;
z-index: 4;
}

.content {
width: min(90vw, 760px);
text-align: left;
transform: translateY(-1.5vh);
opacity: 0;
animation: contentFade 1.5s ease forwards;
animation-delay: 0.15s;
}

@keyframes contentFade {
0% {
opacity: 0;
transform: translateY(18px);
}
100% {
opacity: 1;
transform: translateY(-1.5vh);
}
}

.glass-panel {
display: inline-block;
padding: 10px 12px 12px 0;
background: transparent;
border-radius: 18px;
}

h1 {
margin: 0;
font-family: 'Playfair Display', serif;
font-weight: 400;
font-size: clamp(60px, 8vw, 112px);
line-height: 0.90;
letter-spacing: 0.026em;
color: rgba(35, 38, 45, 0.92);
text-shadow: 0 1px 0 rgba(255,255,255,0.16);
}

.tagline {
margin: 34px 0 0 0;
font-size: clamp(21px, 2vw, 26px);
line-height: 1.25;
color: var(--subtle);
letter-spacing: 0.01em;
}

.soon {
margin: 10px 0 0 0;
font-size: clamp(18px, 1.6vw, 22px);
line-height: 1.25;
color: var(--subtle-2);
opacity: 0.95;
}

.actions {
margin-top: 28px;
display: flex;
align-items: center;
gap: 14px;
flex-wrap: wrap;
}

.button {
display: inline-flex;
align-items: center;
justify-content: center;
min-height: 46px;
padding: 0 18px;
border-radius: 999px;
border: 1px solid rgba(255,255,255,0.34);
background: var(--button-bg);
color: var(--button-text);
text-decoration: none;
font-size: 15px;
font-weight: 500;
letter-spacing: 0.01em;
box-shadow: var(--shadow-soft);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
transition:
transform 0.28s ease,
background 0.28s ease,
box-shadow 0.28s ease,
border-color 0.28s ease;
}

.button:hover {
transform: translateY(-1px);
background: var(--button-bg-hover);
box-shadow: var(--shadow);
border-color: rgba(255,255,255,0.50);
}

.button.secondary {
background: rgba(255,255,255,0.18);
color: var(--subtle);
}

.button.secondary:hover {
background: rgba(255,255,255,0.30);
}

.micro-note {
margin-top: 16px;
font-size: 14px;
line-height: 1.5;
color: rgba(72, 80, 94, 0.82);
max-width: 540px;
}

.fade-up-1 { animation-delay: 0.2s; }
.fade-up-2 { animation-delay: 0.35s; }
.fade-up-3 { animation-delay: 0.5s; }
.fade-up-4 { animation-delay: 0.65s; }

.fade-item {
opacity: 0;
transform: translateY(14px);
animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
to {
opacity: 1;
transform: translateY(0);
}
}

@media (min-width: 1200px) {
.content {
width: min(86vw, 820px);
transform: translateY(-3vh);
}

.bg {
transform: scale(1.08);
}

.ambient-blur {
opacity: 0.68;
filter: blur(36px);
}

h1 {
font-size: clamp(76px, 7vw, 118px);
}

.tagline {
margin-top: 36px;
}
}

@media (max-width: 900px) {
.content {
width: min(92vw, 620px);
}

h1 {
font-size: clamp(54px, 12vw, 88px);
line-height: 0.92;
}

.tagline {
font-size: clamp(18px, 4.6vw, 24px);
margin-top: 26px;
}

.soon {
margin-top: 8px;
font-size: clamp(16px, 4vw, 20px);
}

.actions {
margin-top: 24px;
}
}

@media (max-width: 560px) {
.page {
padding: 26px;
}

.content {
transform: translateY(-0.5vh);
}

.glass-panel {
padding-right: 8px;
}

.button {
width: 100%;
justify-content: center;
}

.micro-note {
font-size: 13.5px;
}
}

@media (prefers-reduced-motion: reduce) {
.bg-wrap,
.content,
.fade-item {
animation: none !important;
}

.bg-wrap {
transform: none !important;
}

.content,
.fade-item {
opacity: 1 !important;
transform: none !important;
}

.button {
transition: none !important;
}
}
</style>
</head>

<script>
(function () {
const bgWrap = document.getElementById('bgWrap');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

if (reduceMotion || !bgWrap) return;

let currentX = 0;
let currentY = 0;
let targetX = 0;
let targetY = 0;

function handleMove(event) {
const x = event.clientX / window.innerWidth;
const y = event.clientY / window.innerHeight;

targetX = (x - 0.5) * 12;
targetY = (y - 0.5) * 9;
}

function animate() {
currentX += (targetX - currentX) * 0.04;
currentY += (targetY - currentY) * 0.04;

bgWrap.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
requestAnimationFrame(animate);
}

window.addEventListener('mousemove', handleMove, { passive: true });
animate();
})();
</script>
