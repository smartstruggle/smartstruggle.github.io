<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Struggle</title>

<!-- Frei nutzbare Schriften -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
--bg: #f7f7f5;
--text: #3f3f3d;
--subtle: #6b6b68;
--line: rgba(80, 80, 80, 0.10);
}

* {
box-sizing: border-box;
}

html, body {
margin: 0;
padding: 0;
min-height: 100%;
background: var(--bg);
}

body {
color: var(--text);
font-family: 'Inter', Arial, sans-serif;
overflow: hidden;
position: relative;
}

/* Hintergrund */
body::before {
content: "";
position: fixed;
inset: 0;
background-image:
linear-gradient(30deg, transparent 46%, var(--line) 46%, var(--line) 54%, transparent 54%),
linear-gradient(150deg, transparent 46%, var(--line) 46%, var(--line) 54%, transparent 54%),
linear-gradient(90deg, transparent 46%, var(--line) 46%, var(--line) 54%, transparent 54%);
background-size: 420px 240px;
background-position: center;
opacity: 0.7;
pointer-events: none;
z-index: 0;
}

.page {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 40px;
position: relative;
z-index: 1;
}

.content {
width: min(90vw, 720px);
text-align: left;
}

h1 {
margin: 0;
font-family: 'Playfair Display', serif;
font-size: clamp(56px, 8vw, 92px);
font-weight: 400;
letter-spacing: 0.02em;
line-height: 0.95;
color: var(--text);
}

.tagline {
margin: 26px 0 0 0;
font-size: clamp(18px, 2vw, 24px);
line-height: 1.3;
color: var(--subtle);
letter-spacing: 0.01em;
}

.soon {
margin: 8px 0 0 0;
font-size: clamp(16px, 1.6vw, 20px);
line-height: 1.3;
color: var(--subtle);
opacity: 0.9;
}

@media (max-width: 700px) {
.content {
width: 100%;
}

.tagline {
margin-top: 20px;
}

.soon {
margin-top: 6px;
}
}
</style>
</head>
<body>
<main class="page">
<section class="content">
<h1>SMART STRUGGLE</h1>
<p class="tagline">you’ve been here before</p>
<p class="soon">coming soon</p>
</section>
</main>
</body>
</html>
