<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Struggle</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
--bg-center: #eef2f8;
--bg-mid: #dbe2ef;
--bg-edge: #c6d0e1;

--text: #23262d;
--subtle: #4f5763;
--subtle-2: #69727e;

--line: rgba(84, 95, 120, 0.11);
--line-soft: rgba(84, 95, 120, 0.06);

--button-bg: rgba(255, 255, 255, 0.42);
--button-bg-hover: rgba(255, 255, 255, 0.62);
--button-text: #2a2f38;

--shadow: 0 16px 36px rgba(54, 68, 96, 0.11);
--shadow-soft: 0 8px 24px rgba(54, 68, 96, 0.07);
}

* {
box-sizing: border-box;
}

html, body {
margin: 0;
padding: 0;
min-height: 100%;
}


.logo {
display: flex;
justify-content: flex-start;
margin-bottom: 6px;
padding-left: 0;
}

.logo img {
width: 140px;
height: auto;
filter: drop-shadow(0 14px 40px rgba(0,0,0,0.10));
}

@media (min-width: 900px) {
.logo {
justify-content: flex-start;
margin-bottom: 0;
padding-left: 120px;
}

.logo img {
width: 190px;
}
}
  
html {
scroll-behavior: smooth;
}

body {
font-family: 'Inter', Arial, sans-serif;
color: var(--text);
overflow: hidden;
position: relative;
background:
radial-gradient(circle at center, rgba(255,255,255,0.80) 0%, rgba(255,255,255,0.16) 34%, rgba(255,255,255,0) 58%),
radial-gradient(circle at center, var(--bg-center) 0%, var(--bg-mid) 58%, var(--bg-edge) 100%);
}

/* weiche Lichtinseln + mehr Raumtiefe */
body::before {
content: "";
position: fixed;
inset: 0;
pointer-events: none;
opacity: 0.52;
background:
radial-gradient(circle at 50% 46%, rgba(255,255,255,0.34) 0%, rgba(255,255,255,0) 30%),
radial-gradient(circle at 18% 22%, rgba(255,255,255,0.24) 0%, rgba(255,255,255,0) 22%),
radial-gradient(circle at 82% 20%, rgba(210,220,238,0.16) 0%, rgba(210,220,238,0) 20%),
radial-gradient(circle at 20% 82%, rgba(205,216,236,0.14) 0%, rgba(205,216,236,0) 22%),
radial-gradient(circle at 80% 78%, rgba(198,210,232,0.12) 0%, rgba(198,210,232,0) 24%);
mix-blend-mode: screen;
z-index: 0;
}

/* feines Grundrauschen */
body::after {
content: "";
position: fixed;
inset: 0;
pointer-events: none;
opacity: 0.035;
background-image:
radial-gradient(rgba(40, 48, 67, 0.85) 0.45px, transparent 0.45px);
background-size: 8px 8px;
z-index: 0;
}

.ambient-blur {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 1;
filter: blur(42px);
opacity: 0.72;
background:
radial-gradient(circle at 50% 48%, rgba(255,255,255,0.52) 0%, rgba(255,255,255,0) 26%),
radial-gradient(circle at 14% 68%, rgba(210,220,238,0.24) 0%, rgba(210,220,238,0) 18%),
radial-gradient(circle at 86% 30%, rgba(205,216,236,0.20) 0%, rgba(205,216,236,0) 18%),
radial-gradient(circle at 50% 100%, rgba(190,202,226,0.10) 0%, rgba(190,202,226,0) 30%);
}

.bg-wrap {
position: fixed;
inset: -2%;
pointer-events: none;
z-index: 2;
transform: translate3d(0, 0, 0);
will-change: transform;
animation: bgFloat 20s ease-in-out infinite;
}

.bg {
width: 104%;
height: 104%;
transform: scale(1.04);
}

@keyframes bgFloat {
0% { transform: translate3d(0px, 0px, 0px); }
25% { transform: translate3d(4px, -5px, 0px); }
50% { transform: translate3d(0px, -10px, 0px); }
75% { transform: translate3d(-4px, -5px, 0px); }
100% { transform: translate3d(0px, 0px, 0px); }
}

.page {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 48px;
position: relative;
z-index: 4;
}

.content {
width: min(90vw, 760px);
text-align: left;
transform: translateY(1.2vh);
opacity: 0;
animation: contentFade 1.5s ease forwards;
animation-delay: 0.15s;
}

@keyframes contentFade {
0% {
opacity: 0;
transform: translateY(18px);
}
100% {
opacity: 1;
transform: translateY(1.2vh);
}
}

.glass-panel {
display: inline-block;
padding: 10px 12px 12px 0;
background: transparent;
border-radius: 18px;
}

h1 {
margin: 0;
font-family: 'Playfair Display', serif;
font-weight: 400;
font-size: clamp(60px, 8vw, 112px);
line-height: 0.90;
letter-spacing: 0.03em;
color: rgba(35, 38, 45, 0.92);
text-shadow: 0 1px 0 rgba(255,255,255,0.18);
}

.tagline {
margin: 28px 0 0 0;
font-size: 0.85rem;
letter-spacing: 0.12em;
text-transform: uppercase;
color: #5f6670;
font-weight: 500;
}

.soon {
margin: 14px 0 0 0;
font-size: 0.95rem;
line-height: 1.5;
color: #6b727c;
max-width: 320px;
}

.actions {
margin-top: 30px;
display: flex;
align-items: center;
gap: 14px;
flex-wrap: wrap;
}

.button {
display: inline-flex;
align-items: center;
justify-content: center;
min-height: 48px;
padding: 0 26px;
border-radius: 999px;
background: #2f4f3f;
color: white;
text-decoration: none;
font-size: 15px;
font-weight: 500;
letter-spacing: 0.02em;
border: none;
transition: all 0.25s ease;
}

.button:hover {
background: #3e6b55;
transform: translateY(-1px);
}

.button.secondary {
background: transparent;
color: #2f4f3f;
border: 1px solid #d17a3a;
}

.button.secondary:hover {
background: #2f4f3f;
color: white;
}

.human-note {
margin-top: 14px;
font-size: 0.95rem;
color: #d17a3a; /* warmes, ruhiges Orange */
font-weight: 500;
}

.tagline-break {
white-space: nowrap;
}
  
.fade-up-1 { animation-delay: 0.2s; }
.fade-up-2 { animation-delay: 0.35s; }
.fade-up-3 { animation-delay: 0.5s; }
.fade-up-4 { animation-delay: 0.65s; }

.fade-item {
opacity: 0;
transform: translateY(14px);
animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
to {
opacity: 1;
transform: translateY(0);
}
}

@media (min-width: 1200px) {
.content {
width: min(86vw, 820px);
transform: translateY(-0.6vh);
}

.bg {
transform: scale(1.08);
}

.ambient-blur {
opacity: 0.76;
filter: blur(46px);
}

h1 {
font-size: clamp(76px, 7vw, 118px);
}
}

@media (max-width: 900px) {
.content {
width: min(92vw, 620px);
transform: translateY(2vh);
}

h1 {
font-size: clamp(54px, 12vw, 88px);
line-height: 0.92;
}

.tagline {
font-size: clamp(18px, 4.6vw, 24px);
margin-top: 26px;
}

.soon {
margin-top: 8px;
font-size: clamp(16px, 4vw, 20px);
}

.actions {
margin-top: 24px;
}
}

@media (max-width: 600px) {
.bg {
opacity: 0.94;
}

.bg-wrap {
min-height: 115vh;
}

.bg-wrap svg {
height: 115%;
}

.page {
padding: 26px;
}

.content {
transform: translateY(2.2vh);
}

.glass-panel {
padding-right: 8px;
}

.button {
width: 100%;
justify-content: center;
}

h1 {
letter-spacing: 0.028em;
}

.tagline {
max-width: 260px;
}

.tagline-break {
display: block;
white-space: normal;
}
  
}

@media (prefers-reduced-motion: reduce) {
.bg-wrap,
.content,
.fade-item {
animation: none !important;
}


@media (max-width: 600px) {
.site-footer {
bottom: 30px;
font-size: 12px;
color: rgba(35, 38, 45, 0.56);
}
}


  
.bg-wrap {
transform: none !important;
}

.content,
.fade-item {
opacity: 1 !important;
transform: none !important;
}

.button {
transition: none !important;
}
}

.site-footer {
position: fixed;
bottom: 22px;
left: 50%;
transform: translateX(-50%);
z-index: 9999;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
font-size: 13px;
color: rgba(35, 38, 45, 0.50);
pointer-events: auto;
}

.site-footer a,
.site-footer span {
position: relative;
z-index: 10000;
}

.site-footer a {
color: inherit;
text-decoration: none;
pointer-events: auto;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
}

.site-footer a:hover {
text-decoration: underline;
}

body::before,
body::after,
.ambient-blur,
.bg-wrap {
pointer-events: none;
}
  
</style>
</head>
<body>
<div class="ambient-blur"></div>

<div class="bg-wrap" id="bgWrap">
<svg class="bg" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
<defs>
<filter id="softBlur" x="-15%" y="-15%" width="130%" height="130%">
<feGaussianBlur stdDeviation="4.5" />

<filter id="mistBlur" x="-20%" y="-20%" width="140%" height="140%">

<rect x="0" y="0" width="1600" height="1000" fill="url(#centerFade)"/>
<rect x="0" y="0" width="1600" height="1000" fill="url(#edgeShade)"/>

<rect x="1320" y="0" width="280" height="1000" fill="url(#mistRight)" opacity="0.72"/>

<ellipse cx="800" cy="470" rx="430" ry="220" fill="rgba(255,255,255,0.18)" filter="url(#mistBlur)" opacity="0.95"/>
<ellipse cx="260" cy="760" rx="260" ry="180" fill="rgba(210,220,238,0.12)" filter="url(#mistBlur)" opacity="0.72"/>
<ellipse cx="1340" cy="260" rx="240" ry="160" fill="rgba(210,220,238,0.10)" filter="url(#mistBlur)" opacity="0.68"/>

<g filter="url(#softBlur)" fill="rgba(255,255,255,0.06)" stroke="var(--line-soft)" stroke-width="1.05" opacity="0.9">

<polygon points="1190,445 1405,320 1620,445 1620,695 1405,820 1190,695" />

<polygon points="115,695 330,570 545,695 545,945 330,1070 115,945" />
<polygon points="545,695 760,570 975,695 975,945 760,1070 545,945" />
<polygon points="975,695 1190,570 1405,695 1405,945 1190,1070 975,945" />

<!-- subtile Linien -->
<g stroke="var(--line)" stroke-width="0.88" opacity="0.62">
<polygon points="115,195 330,70 545,195 545,445 330,570 115,445" />

<polygon points="975,195 1190,70 1405,195 1405,445 1190,570 975,445" />

<!-- Rand-Überlappung -->
<g stroke="var(--line-soft)" stroke-width="0.8" opacity="0.50">

<main class="page">
<section class="content">
<div class="glass-panel">
<div class="logo fade-item fade-up-1">
<img src="logo.png" alt="Smart Struggle Logo">
</div>
<h1 class="fade-item fade-up-1">SMART<br>STRUGGLE</h1>

<p class="tagline fade-item fade-up-2">awareness over <span class="tagline-break">self improvement</span></p>
<p class="soon fade-item fade-up-3">understand your struggles<br>find what actually helps</p>

<p class="human-note fade-item fade-up-4">
you’re not alone in this
</p>
  
<div class="actions fade-item fade-up-4">
<a class="button" href="mailto:hello@smartstruggle.com">early access</a>
<a class="button secondary" href="#more">how it works</a>
</div>
</div>
</section>
</main>

<script>
(function () {
const bgWrap = document.getElementById('bgWrap');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

if (reduceMotion || !bgWrap) return;

let currentX = 0;
let currentY = 0;
let targetX = 0;
let targetY = 0;

function handleMove(event) {
const x = event.clientX / window.innerWidth;
const y = event.clientY / window.innerHeight;

targetX = (x - 0.5) * 12;
targetY = (y - 0.5) * 9;
}

function animate() {
currentX += (targetX - currentX) * 0.04;
currentY += (targetY - currentY) * 0.04;

bgWrap.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
requestAnimationFrame(animate);
}

window.addEventListener('mousemove', handleMove, { passive: true });
animate();
})();
</script>
