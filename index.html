<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Struggle</title>

<!-- Frei nutzbare Schriften -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
--bg: #f7f7f5;
--text: #3f3f3d;
--subtle: #6b6b68;
--line: rgba(80, 80, 80, 0.10);
}

* {
box-sizing: border-box;
}

html, body {
margin: 0;
padding: 0;
min-height: 100%;
background: var(--bg);
}

body {
color: var(--text);
font-family: 'Inter', Arial, sans-serif;
overflow: hidden;
position: relative;
}

/* Hintergrund */
ody::before {
content: "";
position: fixed;
inset: 0;
pointer-events: none;
z-index: 0;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1600 1000' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%23777777' stroke-width='1.2' fill='none' opacity='0.38'%3E%3Cpolygon points='300,200 380,260 300,320 220,260'/%3E%3Cline x1='300' y1='200' x2='300' y2='320'/%3E%3Cline x1='220' y1='260' x2='380' y2='260'/%3E%3Cpolygon points='1200,150 1280,210 1200,270 1120,210'/%3E%3Cline x1='1200' y1='150' x2='1200' y2='270'/%3E%3Cline x1='1120' y1='210' x2='1280' y2='210'/%3E%3Cpolygon points='800,400 920,500 800,600 680,500'/%3E%3Cline x1='800' y1='400' x2='800' y2='600'/%3E%3Cline x1='680' y1='500' x2='920' y2='500'/%3E%3Cpolygon points='400,750 480,810 400,870 320,810'/%3E%3Cline x1='400' y1='750' x2='400' y2='870'/%3E%3Cline x1='320' y1='810' x2='480' y2='810'/%3E%3Cpolygon points='1200,700 1300,780 1200,860 1100,780'/%3E%3Cline x1='1200' y1='700' x2='1200' y2='860'/%3E%3Cline x1='1100' y1='780' x2='1300' y2='780'/%3E%3C/g%3E%3C/svg%3E");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
}


.page {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 40px;
position: relative;
z-index: 1;
}

.content {
width: min(90vw, 720px);
text-align: left;
}

h1 {
margin: 0;
font-family: 'Playfair Display', serif;
font-size: clamp(56px, 8vw, 92px);
font-weight: 400;
letter-spacing: 0.02em;
line-height: 0.95;
color: var(--text);
}

.tagline {
margin: 26px 0 0 0;
font-size: clamp(18px, 2vw, 24px);
line-height: 1.3;
color: var(--subtle);
letter-spacing: 0.01em;
}

.soon {
margin: 8px 0 0 0;
font-size: clamp(16px, 1.6vw, 20px);
line-height: 1.3;
color: var(--subtle);
opacity: 0.9;
}

@media (max-width: 700px) {
.content {
width: 100%;
}

.tagline {
margin-top: 20px;
}

.soon {
margin-top: 6px;
}
}
</style>
</head>
<body>
<main class="page">
<section class="content">
<h1>SMART STRUGGLE</h1>
<p class="tagline">you’ve been here before</p>
<p class="soon">coming soon</p>
</section>
</main>
</body>
</html>
